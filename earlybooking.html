<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Early Booking - Suitcase Travel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:'Segoe UI';margin:0;background:#f5f5f5;}

header {
background:#0a2540;
color:white;
text-align:center;
padding:20px;
}

.container {
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card {
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
padding:20px;
}

.card img {
width:100%;
height:200px;
object-fit:cover;
}

.btn {
display:block;
text-align:center;
margin:20px;
padding:10px;
background:#ff7b00;
color:white;
text-decoration:none;
border-radius:20px;
}
</style>
</head>

<body>

<header>
<h1>Oferte Early Booking</h1>
<p>Rezervă din timp și economisește!</p>
</header>

<div class="container">

<div class="card">
<img src="eb.png">
<h3>Reduceri anticipate</h3>
</div>

<div class="card">
<img src="eb1.png">
<h3>Vacanțe planificate</h3>
</div>

</div>

<a href="index.html" class="btn">Înapoi la site</a>

</body>
</html>
