<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Merch - Suitcase Travel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {font-family:'Segoe UI';margin:0;background:#f5f5f5;}

header {
background:#0a2540;
color:white;
padding:20px;
text-align:center;
}

h1 {margin:0;}

.container {
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card {
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
padding:20px;
}

.card img {
width:100%;
height:200px;
object-fit:contain;
}

.btn {
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#ff7b00;
color:white;
text-decoration:none;
border-radius:20px;
}

.back {
display:block;
text-align:center;
margin:20px;
}
</style>
</head>

<body>

<header>
<h1>Produse Suitcase Travel</h1>
<p>Ia aventura cu tine!</p>
</header>

<div class="container">

<div class="card">
<img src="sticla.png">
<h3>Sticlă Travel</h3>
<p>50 lei</p>
</div>

<div class="card">
<img src="tricou.png">
<h3>Tricou Travel</h3>
<p>80 lei</p>
</div>

<div class="card">
<img src="valiza.png">
<h3>Valiză Travel</h3>
<p>300 lei</p>
</div>

<div class="card">
<img src="insigna.png">
<h3>Insignă Travel</h3>
<p>20 lei</p>
</div>

</div>

<a href="index.html" class="btn back">Înapoi la site</a>

</body>
</html>
